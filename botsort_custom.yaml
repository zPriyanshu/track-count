tracker_type: botsort
track_high_thresh: 0.5
track_low_thresh: 0.1
new_track_thresh: 0.5
track_buffer: 90
match_thresh: 0.85
gmc_method: sparseOptFlow   # Camera motion compensation — great for dashcam/aerial
proximity_thresh: 0.5
appearance_thresh: 0.25
with_reid: False            # Set True if you install a ReID model (even better accuracy)
